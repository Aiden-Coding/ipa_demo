name: Build and Release IPA

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-14
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Select Latest Xcode 16
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -n 1)
          if [ -d "$XCODE_PATH" ]; then
            echo "Selecting Xcode 16: $XCODE_PATH"
            sudo xcode-select -s "$XCODE_PATH"
          else
            echo "Xcode 16 not found, listing available Xcode installations:"
            ls -d /Applications/Xcode*.app
            LATEST_XCODE=$(ls -d /Applications/Xcode*.app | sort -V | tail -n 1)
            echo "Selecting latest available Xcode: $LATEST_XCODE"
            sudo xcode-select -s "$LATEST_XCODE"
          fi
          xcodebuild -version
        
      - name: Install XcodeGen
        run: brew install xcodegen
        
      - name: Generate Xcode Project
        run: xcodegen generate
        
      - name: Build App
        run: |
          xcodebuild build \
            -scheme ipa_demo \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build_output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS=""
            
      - name: Package IPA
        run: |
          mkdir Payload
          cp -r build_output/Build/Products/Release-iphoneos/ipa_demo.app Payload/
          zip -r ipa_demo.ipa Payload
          
      - name: Create GitHub Release and Upload Artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ github.ref_name }}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG_NAME="manual-build-$(date +'%Y%m%d-%H%M%S')"
          fi
          
          echo "Publishing release for tag: $TAG_NAME"
          gh release create "$TAG_NAME" ipa_demo.ipa \
            --title "Release $TAG_NAME" \
            --notes "这是由 GitHub Actions 自动构建的无签名 (Unsigned) iOS App Demo (.ipa)。你可以使用 TrollStore、AltStore 或 Sideloadly 将其安装到您的 iOS 设备上。"
